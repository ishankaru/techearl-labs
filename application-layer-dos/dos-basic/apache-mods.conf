# Lab tweaks for dos-basic.
#
# Apache's mod_reqtimeout (enabled by default in the php:8.2-apache image)
# already enforces a body minrate of 500 B/s, which means classical
# slow-body demonstrations are killed by Apache before they reach the PHP
# layer. That is the right defence; this lab disables it so the vulnerable
# endpoint actually demonstrates the broken state and so we can teach the
# defended sibling with conviction. The defended endpoint reapplies the
# guard at the PHP layer (per-read timeout + wall-clock deadline + body cap)
# and the README spells out that in a real architecture the right move is
# to keep mod_reqtimeout on and add a reverse-proxy body timeout.
<IfModule mod_reqtimeout.c>
    RequestReadTimeout header=0 body=0
</IfModule>

# Raise Timeout so a slow-body upload can demonstrably hold a worker for
# longer than the default 60s. 300s is the upstream Apache default; we
# bring it back here after the override that mod_reqtimeout used to enforce.
Timeout 300
KeepAliveTimeout 5

# Allow mod_status to be reached from inside the container for `apache2ctl
# status` demos. Localhost only.
<Location "/server-status">
    SetHandler server-status
    Require local
</Location>

# A tiny worker pool so the slow-body demo shows starvation quickly.
# Default mpm_prefork pool can be 150+ workers; that buries the point.
<IfModule mpm_prefork_module>
    StartServers           2
    MinSpareServers        2
    MaxSpareServers        4
    MaxRequestWorkers      6
    MaxConnectionsPerChild 0
</IfModule>
