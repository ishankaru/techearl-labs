services:

  # ---- SQL Injection ----

  sqli-basic:
    build: ./sql-injection/sqli-basic
    container_name: sqli-basic
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      sqli-basic-db:
        condition: service_healthy
    environment:
      DB_HOST: sqli-basic-db
      DB_USER: webapp
      DB_PASS: webapp123
      DB_NAME: shop
    volumes:
      - sqli-basic-webroot:/var/www/html

  sqli-basic-db:
    image: mysql:8.0
    container_name: sqli-basic-db
    command:
      - --secure-file-priv=
      - --local-infile=1
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shop
    volumes:
      - ./sql-injection/sqli-basic/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - sqli-basic-webroot:/var/www/html
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---- Cross-Site Scripting ----

  xss-basic:
    build: ./cross-site-scripting/xss-basic
    container_name: xss-basic
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      xss-basic-db:
        condition: service_healthy
    environment:
      DB_HOST: xss-basic-db
      DB_USER: webapp
      DB_PASS: webapp123
      DB_NAME: xss_lab
    volumes:
      - xss-basic-webroot:/var/www/html

  xss-basic-db:
    image: mysql:8.0
    container_name: xss-basic-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: xss_lab
    volumes:
      - ./cross-site-scripting/xss-basic/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---- Server-Side Request Forgery ----

  ssrf-basic:
    build: ./server-side-request-forgery/ssrf-basic
    container_name: ssrf-basic
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - ssrf-basic-internal
      - ssrf-basic-metadata

  ssrf-basic-internal:
    build: ./server-side-request-forgery/ssrf-basic/internal
    container_name: ssrf-basic-internal

  ssrf-basic-metadata:
    build: ./server-side-request-forgery/ssrf-basic/metadata
    container_name: ssrf-basic-metadata

  # ---- File Upload ----

  upload-basic:
    build: ./file-upload/upload-basic
    container_name: upload-basic
    ports:
      - "127.0.0.1:8083:80"
    volumes:
      - upload-basic-webroot:/var/www/html

  # ---- Path Traversal / LFI ----

  lfi-basic:
    build: ./path-traversal/lfi-basic
    container_name: lfi-basic
    ports:
      - "127.0.0.1:8084:80"

  # ---- Remote Code Execution ----

  rce-basic:
    build: ./remote-code-execution/rce-basic
    container_name: rce-basic
    ports:
      - "127.0.0.1:8085:80"

  # ---- XML External Entity ----

  xxe-basic:
    build: ./xml-external-entity/xxe-basic
    container_name: xxe-basic
    ports:
      - "127.0.0.1:8086:80"
    depends_on:
      - xxe-basic-collab

  xxe-basic-collab:
    build: ./xml-external-entity/xxe-basic-collab
    container_name: xxe-basic-collab

  # ---- Insecure Deserialization ----

  deser-basic:
    build: ./insecure-deserialization/deser-basic
    container_name: deser-basic
    ports:
      - "127.0.0.1:8087:80"

  # ---- API Security Attacks ----

  api-basic:
    build: ./api-security-attacks/api-basic
    container_name: api-basic
    ports:
      - "127.0.0.1:8088:3000"

  # ---- Cross-Site Request Forgery ----

  csrf-basic:
    build: ./cross-site-request-forgery/csrf-basic
    container_name: csrf-basic
    ports:
      - "127.0.0.1:8089:80"

  # ---- Clickjacking ----

  clickjacking-target:
    build: ./clickjacking/clickjacking-basic/target
    container_name: clickjacking-target
    ports:
      - "127.0.0.1:8090:80"

  clickjacking-attacker:
    build: ./clickjacking/clickjacking-basic/attacker
    container_name: clickjacking-attacker
    ports:
      - "127.0.0.1:8091:80"

  # ---- Application-Layer DoS ----

  dos-basic:
    build: ./application-layer-dos/dos-basic
    container_name: dos-basic
    ports:
      - "127.0.0.1:8092:80"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    pids_limit: 200

volumes:
  sqli-basic-webroot:
  xss-basic-webroot:
  upload-basic-webroot:
